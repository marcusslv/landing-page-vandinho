<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simule seu Consórcio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f5f7fa; padding: 20px; }
    .container { max-width: 700px; margin: auto; }
    .card { background: #fff; padding: 24px; border-radius: 14px; margin-bottom: 20px; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
    .hidden { display: none; }
    .step { display: none; }
    .step.active { display: block; }
    .progress { display: flex; gap: 6px; margin-bottom: 20px; }
    .progress div { flex: 1; height: 6px; background: #ddd; border-radius: 4px; transition: all .3s; }
    .progress .active { background: #007bff; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
    input.error { border-color: red; }
    .error-message { color: red; font-size: 12px; margin-top: 4px; }
    .button { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; background: #007bff; color: #fff; font-size: 15px; }
    .button.secondary { background: #e0e0e0; color: #000; margin-bottom: 10px; }
    .loading { opacity: 0.7; pointer-events: none; }
    .center { text-align: center; }
    .icon { font-size: 48px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">

    <div class="progress" id="progressBar">
      <div id="p1" class="active"></div>
      <div id="p2"></div>
      <div id="p3"></div>
    </div>

    <form id="form">

      <!-- STEP 1 -->
      <div class="card step active" data-step="1">
        <h3>Dados do Usuário</h3>
        <div class="field">
          <label>Nome *</label>
          <input type="text" id="nome" />
          <div class="error-message" id="nomeError"></div>
        </div>
        <div class="field">
          <label>Telefone *</label>
          <input type="text" id="telefone" />
          <div class="error-message" id="telefoneError"></div>
        </div>
        <div class="field">
          <label>Email *</label>
          <input type="email" id="email" />
          <div class="error-message" id="emailError"></div>
        </div>
        <button type="button" class="button" onclick="nextStep()">Próximo</button>
      </div>

      <!-- STEP 2 -->
      <div class="card step" data-step="2">
        <h3>Tipo de Consórcio</h3>
        <label><input type="radio" name="consorcio" value="imovel" /> Imóvel</label>
        <label><input type="radio" name="consorcio" value="automovel" /> Automóvel</label>
        <div class="error-message" id="consorcioError"></div>
        <button type="button" class="button secondary" onclick="prevStep()">Voltar</button>
        <button type="button" class="button" onclick="nextStep()">Próximo</button>
      </div>

      <!-- STEP 3 -->
      <div class="card step" data-step="3">
        <h3>Dados Financeiros</h3>
        <div class="field">
          <label>Valor do bem *</label>
          <input type="text" id="valorBem" />
        </div>
        <div class="field">
          <label>Valor da parcela *</label>
          <input type="text" id="valorParcela" />
        </div>
        <button type="button" class="button secondary" onclick="prevStep()">Voltar</button>
        <button type="submit" class="button">Enviar</button>
      </div>

      <!-- STEP 4 - THANK YOU -->
      <div class="card step center" data-step="4">
        <div class="icon">✅</div>
        <h2>Obrigado!</h2>
        <p>Recebemos suas informações com sucesso.</p>
        <p>Em breve entraremos em contato com uma proposta personalizada.</p>
        <br/>
        <button type="button" class="button" onclick="restart()">Nova simulação</button>
      </div>

    </form>
  </div>

  <script>
    let step = 1;

    const showStep = () => {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.querySelector(`[data-step="${step}"]`).classList.add('active');

      const progress = document.getElementById('progressBar');
      if (step === 4) {
        progress.style.display = 'none';
      } else {
        progress.style.display = 'flex';
        document.querySelectorAll('.progress div').forEach((p, i) => {
          p.classList.toggle('active', i < step);
        });
      }
    };

    const nextStep = () => {
      if (step < 3) step++;
      showStep();
      track('next_step_' + step);
    };

    const prevStep = () => {
      if (step > 1) step--;
      showStep();
    };

    const restart = () => {
      step = 1;
      form.reset();
      showStep();
      track('restart_form');
    };

    const track = (event) => {
      console.log('Analytics event:', event);
    };

    const formatPhone = v => v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
    const formatCurrency = v => 'R$ ' + (v.replace(/\D/g,'')/100).toFixed(2).replace('.',',');

    telefone.oninput = e => e.target.value = formatPhone(e.target.value);
    valorBem.oninput = e => e.target.value = formatCurrency(e.target.value);
    valorParcela.oninput = e => e.target.value = formatCurrency(e.target.value);

    form.addEventListener('submit', e => {
      e.preventDefault();
      form.classList.add('loading');
      track('submit_form');

      setTimeout(() => {
        form.classList.remove('loading');
        step = 4; // vai para etapa de obrigado
        showStep();
        track('success_step');
      }, 1500);
    });

    showStep();

    
  </script>
</body>
</html>
