<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simule seu Consórcio</title>
  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --gray: #6b7280;
      --bg: #f3f4f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    body { background: var(--bg); padding: 24px; }

    .container {
      max-width: 640px;
      margin: auto;
    }

    .card {
      background: #fff;
      padding: 28px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    h3 {
      margin-bottom: 20px;
      font-size: 20px;
    }

    .step { display: none; }
    .step.active { display: block; }

    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .progress div {
      flex: 1;
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      transition: 0.3s;
    }

    .progress .active {
      background: var(--primary);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #111827;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      transition: 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: normal;
    }

    .radio-group input[type="radio"] {
      width: auto;
      margin: 0;
      accent-color: var(--primary);
    }

    .button {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: white;
      text-align: center;
      text-decoration: none;
      margin-top: 10px;
      transition: 0.2s;
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .button.whatsapp {
      background: var(--success);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions .button {
      flex: 1;
    }

    .center {
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .center p {
      color: var(--gray);
      margin-top: 8px;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="progress" id="progressBar">
      <div class="active"></div>
      <div></div>
      <div></div>
    </div>

    <form id="form">

      <div class="card step active" data-step="1">
        <h3>Dados do Usuário</h3>

        <div class="field">
          <label>Nome</label>
          <input type="text" id="nome" />
        </div>

        <div class="field">
          <label>Telefone</label>
          <input type="text" id="telefone" />
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="email" />
        </div>

        <button type="button" class="button" onclick="nextStep()">Continuar</button>
      </div>

      <div class="card step" data-step="2">
        <h3>Tipo de Consórcio</h3>

        <div class="radio-group">
          <label><input type="radio" name="consorcio" value="Imóvel" /> Imóvel</label>
          <label><input type="radio" name="consorcio" value="Automóvel" /> Automóvel</label>
        </div>

        <div class="actions">
          <button type="button" class="button secondary" onclick="prevStep()">Voltar</button>
          <button type="button" class="button" onclick="nextStep()">Continuar</button>
        </div>
      </div>

      <div class="card step" data-step="3">
        <h3>Dados Financeiros</h3>

        <div class="field">
          <label>Valor do bem</label>
          <input type="text" id="valorBem" />
        </div>

        <div class="field">
          <label>Valor da parcela</label>
          <input type="text" id="valorParcela" />
        </div>

        <div class="actions">
          <button type="button" class="button secondary" onclick="prevStep()">Voltar</button>
          <button type="submit" class="button">Enviar</button>
        </div>
      </div>

      <div class="card step center" data-step="4">
        <div class="icon">✅</div>
        <h2>Obrigado!</h2>
        <p>Recebemos suas informações com sucesso.</p>
        <p>Fale com nosso especialista agora:</p>

        <a id="whatsappBtn" class="button whatsapp" target="_blank">Falar no WhatsApp</a>

        <button type="button" class="button" onclick="restart()">Nova simulação</button>
      </div>

    </form>
  </div>

  <script>
    let step = 1;

    const showStep = () => {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.querySelector(`[data-step="${step}"]`).classList.add('active');

      const bars = document.querySelectorAll('.progress div');
      bars.forEach((b, i) => b.classList.toggle('active', i < step));

      document.getElementById('progressBar').style.display = step === 4 ? 'none' : 'flex';
    };

    const nextStep = () => { if (step < 3) step++; showStep(); };
    const prevStep = () => { if (step > 1) step--; showStep(); };

    const restart = () => {
      step = 1;
      form.reset();
      showStep();
    };

    const formatPhone = v => v.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
    const formatCurrency = v => 'R$ ' + (v.replace(/\D/g,'')/100).toFixed(2).replace('.',',');

    telefone.oninput = e => e.target.value = formatPhone(e.target.value);
    valorBem.oninput = e => e.target.value = formatCurrency(e.target.value);
    valorParcela.oninput = e => e.target.value = formatCurrency(e.target.value);

    form.addEventListener('submit', e => {
      e.preventDefault();

      const nome = document.getElementById('nome').value;
      const telefone = document.getElementById('telefone').value;
      const email = document.getElementById('email').value;
      const consorcio = document.querySelector('input[name="consorcio"]:checked')?.value;
      const valorBem = document.getElementById('valorBem').value;
      const valorParcela = document.getElementById('valorParcela').value;

      const mensagem = `Olá, me chamo ${nome}. Tenho interesse em consórcio de ${consorcio}. Valor do bem: ${valorBem}, parcela: ${valorParcela}. Contato: ${telefone}, ${email}`;

      document.getElementById('whatsappBtn').href = `https://wa.me/5527995192956?text=${encodeURIComponent(mensagem)}`;

      step = 4;
      showStep();
    });

    showStep();
  </script>
</body>
</html>
